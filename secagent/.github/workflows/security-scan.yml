name: SecAgent Security Scan
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: '0 6 * * 1'  # every Monday 06:00 UTC
  workflow_dispatch:
    inputs:
      target_domain:
        description: Target domain to scan
        required: false
        type: string

jobs:
  health-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          pip install -e ".[mcp]"

      - name: Run health check
        run: |
          python -c "from secagent.tools.check_health import check_health; r=check_health(); print(r['summary'])"

  scan:
    needs: health-check
    if: github.event_name == 'workflow_dispatch' && inputs.target_domain != ''
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies + tools
        run: |
          pip install -e ".[mcp]"
          make install 2>/dev/null || true  # tools are optional in CI

      - name: Attack surface scan
        env:
          SECAGENT_AUTHZ_TOKEN: ${{ secrets.SECAGENT_AUTHZ_TOKEN }}
        run: |
          python -c "
          from secagent.core.gate import ComplianceGate
          from secagent.tools.attack_surface_scan import attack_surface_scan
          from secagent.core.remediation import enrich_finding
          import json

          # CI mode: no auth — use bypass gate
          from secagent.tools.scan_vulnerabilities import scan_vulnerabilities
          result = attack_surface_scan(
              gate=ComplianceGate(),
              params={'target_domain': '${{ inputs.target_domain }}',
                      'skip_port_scan': True, 'max_scan_targets': 5},
              authz_token='ci_${{ github.run_id }}',
              caller_id='github-actions',
          )
          # Enrich findings
          for f in result.get('findings', []):
              enrich_finding(f)
          report = {
              'summary': result['summary'],
              'scan_targets': result.get('scan_targets', []),
              'findings': result['findings'],
          }
          with open('secagent-report.json', 'w') as fh:
              json.dump(report, fh, indent=2, ensure_ascii=False)
          print(f\"Found {result['summary']['total']} findings\")
          for s in ('critical','high','medium','low','info'):
              n = result['summary']['by_severity'].get(s, 0)
              if n: print(f'  {s}: {n}')
          " && cat secagent-report.json

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: secagent-scan-report
          path: secagent-report.json

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: pip

      - name: Install
        run: pip install -e ".[mcp]"

      - name: Run tests
        run: python -m pytest tests/ --tb=short -q

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: .pytest_cache/
