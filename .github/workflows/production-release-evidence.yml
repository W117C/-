name: Production Release Evidence

on:
  workflow_dispatch:
    inputs:
      runner-config:
        description: Optional path to a productionreleaserunner.py config JSON file.
        required: false
        default: ""
      artifact-root:
        description: Directory where release evidence artifacts are written.
        required: false
        default: artifacts/production-release-ci
      fail-on-blocked:
        description: Return a failing status when the production gate is blocked.
        required: false
        type: boolean
        default: false
  pull_request:
    paths:
      - ".github/workflows/production-release-evidence.yml"
      - "scripts/windows/run-production-release-evidence.bat"
      - "scripts/windows/run-production-final-signoff.bat"
      - "tools/four-runtime-ci-manifest-from-artifacts.py"
      - "tools/fourruntimeonlinecievidence.py"
      - "tools/productionreleaserunner.py"
      - "tools/production-operator-signoff.py"
      - "tools/*evidence*.py"
      - "contracts/*evidence*.schema.json"
      - "contracts/production-operator-signoff.schema.json"
      - "contracts/runtime-ci-artifact.schema.json"
      - "tests/testfourruntimeonlinecievidence.py"
      - "tests/testproductionreleaseci.py"
  push:
    branches:
      - master
      - main
    paths:
      - ".github/workflows/production-release-evidence.yml"
      - "scripts/windows/run-production-release-evidence.bat"
      - "scripts/windows/run-production-final-signoff.bat"
      - "tools/four-runtime-ci-manifest-from-artifacts.py"
      - "tools/fourruntimeonlinecievidence.py"
      - "tools/productionreleaserunner.py"
      - "tools/production-operator-signoff.py"
      - "tools/*evidence*.py"
      - "contracts/*evidence*.schema.json"
      - "contracts/production-operator-signoff.schema.json"
      - "contracts/runtime-ci-artifact.schema.json"

permissions:
  contents: read

jobs:
  production-release-evidence:
    name: Production release evidence
    runs-on: windows-latest
    timeout-minutes: 30
    env:
      ARTIFACT_ROOT: ${{ inputs.artifact-root || 'artifacts/production-release-ci' }}
      RUNNER_CONFIG: ${{ inputs.runner-config || '' }}
      FAIL_ON_BLOCKED: ${{ inputs.fail-on-blocked || 'false' }}
      RUNNER_OUTPUT: ${{ inputs.artifact-root || 'artifacts/production-release-ci' }}/production-release-runner.json
      SIGNOFF_OUTPUT: ${{ inputs.artifact-root || 'artifacts/production-release-ci' }}/production-operator-signoff.json
      RUNTIME_CI_ARTIFACT_ROOT: ${{ inputs.artifact-root || 'artifacts/production-release-ci' }}/runtime-ci-artifacts
      FOUR_RUNTIME_CI_MANIFEST: ${{ inputs.artifact-root || 'artifacts/production-release-ci' }}/inputs/four-runtime-online-ci-manifest.json
      FOUR_RUNTIME_CI_EVIDENCE: ${{ inputs.artifact-root || 'artifacts/production-release-ci' }}/four-runtime-online-ci-evidence.json

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: gospider/go.mod
          cache-dependency-path: |
            gospider/go.sum
            go.work.sum

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Set Rust stable toolchain
        shell: pwsh
        run: rustup default stable

      - name: Install Python test dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest jsonschema

      - name: Run four-runtime CI and write runtime artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path $env:RUNTIME_CI_ARTIFACT_ROOT | Out-Null

          function ConvertTo-RepoRelativePath {
            param([string] $Path)
            $repo = [System.IO.Path]::GetFullPath(".")
            $resolved = [System.IO.Path]::GetFullPath($Path)
            if ($resolved.StartsWith($repo)) {
              return $resolved.Substring($repo.Length).TrimStart("\", "/").Replace("\", "/")
            }
            return $resolved.Replace("\", "/")
          }

          function Read-Version {
            param([string] $Command)
            $value = (& cmd /c $Command 2>&1 | Out-String).Trim()
            if (-not $value) {
              return ""
            }
            return ($value -split "`r?`n")[0].Trim()
          }

          function Invoke-RuntimeCi {
            param(
              [string] $Runtime,
              [string] $Command,
              [string] $VersionCommand
            )

            $artifactPath = Join-Path $env:RUNTIME_CI_ARTIFACT_ROOT "$Runtime-runtime-ci.json"
            $stdoutPath = Join-Path $env:RUNTIME_CI_ARTIFACT_ROOT "$Runtime-stdout.txt"
            $stderrPath = Join-Path $env:RUNTIME_CI_ARTIFACT_ROOT "$Runtime-stderr.txt"
            $version = Read-Version -Command $VersionCommand
            $stopwatch = [System.Diagnostics.Stopwatch]::StartNew()
            & cmd /c $Command 1> $stdoutPath 2> $stderrPath
            $exitCode = if ($null -eq $LASTEXITCODE) { 1 } else { [int] $LASTEXITCODE }
            $stopwatch.Stop()
            $status = if ($exitCode -eq 0) { "passed" } else { "failed" }
            $payload = [ordered]@{
              "schema" = "spider.runtime-ci.artifact"
              "runtime" = $Runtime
              "status" = $status
              "command" = $Command
              "version" = $version
              "artifact-paths" = @(
                (ConvertTo-RepoRelativePath -Path $artifactPath),
                (ConvertTo-RepoRelativePath -Path $stdoutPath),
                (ConvertTo-RepoRelativePath -Path $stderrPath)
              )
              "exit-code" = $exitCode
              "duration-ms" = [int] [Math]::Max(1, $stopwatch.ElapsedMilliseconds)
              "stdout-path" = (ConvertTo-RepoRelativePath -Path $stdoutPath)
              "stderr-path" = (ConvertTo-RepoRelativePath -Path $stderrPath)
              "runtime-command-executed" = $true
              "network-executed" = $false
            }
            if ($exitCode -ne 0) {
              $payload["failure-reason"] = "runtime-ci-command-exited-$exitCode"
            }
            $payload | ConvertTo-Json -Depth 10 | Set-Content -Encoding utf8 -Path $artifactPath
          }

          Invoke-RuntimeCi -Runtime python -Command "python -B -m pytest -o addopts= tests/testfourruntimeonlinecievidence.py -q" -VersionCommand "python --version"
          Invoke-RuntimeCi -Runtime go -Command "go test ./gospider -run TestRuntimeCiSmoke -count=1" -VersionCommand "go version"
          Invoke-RuntimeCi -Runtime rust -Command "cargo test --manifest-path rustspider/runtime-ci-smoke/Cargo.toml" -VersionCommand "rustc --version"
          Invoke-RuntimeCi -Runtime java -Command "mvn -f javaspider/runtime-ci-smoke/pom.xml test" -VersionCommand "mvn --version"

          $global:LASTEXITCODE = 0

      - name: Generate four-runtime manifest and evidence
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path (Split-Path $env:FOUR_RUNTIME_CI_MANIFEST -Parent) | Out-Null
          $runUrl = "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          python -B tools/four-runtime-ci-manifest-from-artifacts.py `
            --artifact-root $env:RUNTIME_CI_ARTIFACT_ROOT `
            --repo-root . `
            --ci-provider github-actions `
            --run-id "${{ github.run_id }}" `
            --run-url $runUrl `
            --output $env:FOUR_RUNTIME_CI_MANIFEST
          python -B tools/fourruntimeonlinecievidence.py `
            --manifest $env:FOUR_RUNTIME_CI_MANIFEST `
            --repo-root . `
            --output $env:FOUR_RUNTIME_CI_EVIDENCE

      - name: Run production release evidence chain
        shell: pwsh
        run: |
          $generatedConfig = Join-Path $env:ARTIFACT_ROOT "production-release-runner.generated-config.json"
          if (-not $env:RUNNER_CONFIG) {
            @{
              "inputs" = @{
                "four-runtime-online-ci" = $env:FOUR_RUNTIME_CI_MANIFEST.Replace("\", "/")
              }
            } | ConvertTo-Json -Depth 5 | Set-Content -Encoding utf8 -Path $generatedConfig
            $env:RUNNER_CONFIG = $generatedConfig
          }
          $args = @(
            "-B",
            "tools/productionreleaserunner.py",
            "--repo-root",
            ".",
            "--artifact-root",
            $env:ARTIFACT_ROOT,
            "--output",
            $env:RUNNER_OUTPUT
          )
          if ($env:RUNNER_CONFIG) {
            $args += @("--config", $env:RUNNER_CONFIG)
          }
          if ($env:FAIL_ON_BLOCKED -eq "true") {
            $args += "--fail-on-blocked"
          }
          if (Test-Path "tools/productionreleaserunner.py") {
            python @args
          } else {
            @{
              "schema" = "spider.production-release-runner"
              "state" = "blocked"
              "status" = "blocked"
              "production-ready" = $false
              "blocking-reasons" = @("productionreleaserunner-tool-missing")
              "inputs" = @{
                "four-runtime-online-ci" = $env:FOUR_RUNTIME_CI_MANIFEST.Replace("\", "/")
              }
            } | ConvertTo-Json -Depth 8 | Set-Content -Encoding utf8 -Path $env:RUNNER_OUTPUT
            if ($env:FAIL_ON_BLOCKED -eq "true") {
              exit 2
            }
          }

      - name: Write production final signoff preview
        if: always()
        shell: pwsh
        run: |
          $accessStatus = Join-Path $env:ARTIFACT_ROOT "production-access-status.json"
          $approvalPath = Join-Path $env:ARTIFACT_ROOT "operator-approval.evidence.json"
          $args = @(
            "tools/production-operator-signoff.py",
            "--access-status",
            $accessStatus,
            "--release-runner",
            $env:RUNNER_OUTPUT,
            "--approval",
            $approvalPath,
            "--output",
            $env:SIGNOFF_OUTPUT
          )
          if ($env:FAIL_ON_BLOCKED -eq "true") {
            $args += "--fail-on-blocked"
          }
          python @args

      - name: Upload production release evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: production-release-evidence
          path: ${{ env.ARTIFACT_ROOT }}
          if-no-files-found: error
